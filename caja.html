<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pedidos</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="text-center mb-5">Sistema cajas</h1>

        <div class="row">
            <!-- MODULO AGREGAR PEDIDO -->
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header">
                        <h3>Nuevo Pedido</h3>
                    </div>
                    <div class="card-body">
                        <input type="text" id="cliente" class="form-control mb-3" placeholder="Cliente">

                        <select id="producto" class="form-select mb-3">
                            <option value="">Selecciona una comida</option>
                            <option value="CafeG">CaféGde</option>
                            <option value="CafeM">CaféM</option>
                            <option value="Quason">Quason</option>
                            <option value="Papas">Papas</option>
                            <option value="Refresco">Refresco</option>
                        </select>

                        <input type="number" id="cantidad" class="form-control mb-3" placeholder="Cantidad">

                        <button class="btn btn-primary w-100" onclick="guardarPedido()">
                            Agregar Pedido
                        </button>
                    </div>
                </div>
            </div>

            <!-- MODULO LISTA -->
            <div class="col-md-7">
                <div class="card shadow">
                    <div class="card-header">
                        <h3>Lista de Pedidos</h3>
                    </div>
                    <div class="card-body">
                        <ul id="listaPedidos" class="list-group mb-4"></ul>
                        <h4 id="ventasTotales">Total ventas: $0</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TU JS -->
    <script src="caja.js"></script>

    <script>

    function guardarPedido() {

        let cliente =
        document.getElementById("cliente").value;

        let producto =
        document.getElementById("producto").value;

        let cantidad =
        Number(document.getElementById("cantidad").value);

        // LLAMAR FUNCION DEL JS
        agregarPedido(cliente, producto, cantidad);

        // LIMPIAR INPUTS
        document.getElementById("cliente").value = "";

        document.getElementById("producto").value = "";

            document.getElementById("cantidad").value = "";
        }

    </script>

</body>
</html>
