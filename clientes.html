<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clientes - Pedidos</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

    <div class="container mt-5">

        <h1 class="text-center mb-5">
            Coffee shop Clientes
        </h1>

        <div class="row g-4">

            <!-- MENU DE COMIDAS -->
            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">
                        <h3>Menú</h3>
                    </div>

                    <div class="card-body">

                        <ul class="list-group">

                            <li class="list-group-item">
                                Café gde - $120
                            </li>

                            <li class="list-group-item">
                                Café mediano - $90
                            </li>

                            <li class="list-group-item">
                                quason - $80
                            </li>

                            <li class="list-group-item">
                                Papas - $50
                            </li>

                            <li class="list-group-item">
                                Refresco - $35
                            </li>

                        </ul>

                    </div>

                </div>

            </div>


            
            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">
                        <h3>Crear Pedido</h3>
                    </div>

                    <div class="card-body">

                        <input
                            type="text"
                            id="cliente"
                            class="form-control mb-3"
                            placeholder="Nombre del cliente"
                        >

                        <select
                            id="producto"
                            class="form-select mb-3"
                        >
                            <option value="">Selecciona una comida</option>

                            <option value="CafeG">
                                CaféGde
                            </option>

                            <option value="CafeM">
                                CaféM
                            </option>

                            <option value="Quason">
                                Quason
                            </option>

                            <option value="Papas">
                                Papas
                            </option>

                            <option value="Refresco">
                                Refresco
                            </option>

                        </select>

                        <input
                            type="number"
                            id="cantidad"
                            class="form-control mb-3"
                            placeholder="Cantidad"
                        >

                        <button
                            class="btn btn-success w-100"
                            onclick="crearPedido()"
                        >
                            Crear Pedido
                        </button>

                    </div>

                </div>

            </div>


            
            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-header bg-dark text-white">
                        <h3>Pedidos Realizados</h3>
                    </div>

                    <div class="card-body">

                        <table class="table table-striped">

                            <thead>

                                <tr>
                                    <th>Cliente</th>
                                    <th>Producto</th>
                                    <th>Cantidad</th>
                                    <th>Precio</th>
                                    <th>Total</th>
                                </tr>

                            </thead>

                            <tbody id="tablaPedidos">

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <!-- JS -->
    <script src="menu.js"></script>

</body>
</html>
